<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影月的信息聚合中心 | OpenClaw Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --urgent: #ff4d4f; --action: #1890ff; --know: #52c41a;
            --delegate: #faad14; --archive: #d9d9d9;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh; color: #333;
        }
        
        .header { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            color: white; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        .header .subtitle { opacity: 0.8; font-size: 14px; font-weight: 300; }
        
        .time-badge {
            background: rgba(255,255,255,0.1); padding: 8px 16px;
            border-radius: 20px; font-size: 13px; backdrop-filter: blur(10px);
        }
        
        .mode-selector { display: flex; gap: 10px; margin-top: 15px; }
        .mode-btn {
            padding: 10px 24px; border: none; background: rgba(255,255,255,0.1);
            color: white; border-radius: 8px; cursor: pointer; font-size: 14px;
            transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .mode-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .mode-btn.active { background: white; color: #1a1a2e; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 25px; }
        
        .nav-tabs { 
            display: flex; gap: 12px; margin-bottom: 25px;
            background: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow-x: auto;
        }
        .nav-tab { 
            padding: 12px 24px; border: none; background: #f5f5f5;
            border-radius: 8px; cursor: pointer; font-size: 14px;
            transition: all 0.3s; white-space: nowrap; font-weight: 500;
        }
        .nav-tab:hover { background: #e6f7ff; color: #1890ff; transform: translateY(-1px); }
        .nav-tab.active { 
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white; box-shadow: 0 4px 12px rgba(24,144,255,0.3);
        }
        
        .content-area { display: none; animation: fadeIn 0.4s ease; }
        .content-area.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .daily-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .daily-grid .urgent-section { grid-column: 1 / -1; }
        
        .section-card { 
            background: white; border-radius: 16px; padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: all 0.3s; border: 1px solid #f0f0f0;
        }
        .section-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
        
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .section-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .section-title { font-size: 17px; font-weight: 600; color: #1a1a2e; }
        
        .info-item { padding: 14px 16px; margin-bottom: 12px; border-radius: 10px; background: #fafafa; border-left: 4px solid #d9d9d9; }
        .info-item.urgent { border-left-color: var(--urgent); background: #fff1f0; }
        .info-item.action { border-left-color: var(--action); background: #e6f7ff; }
        .info-item.know { border-left-color: var(--know); background: #f6ffed; }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 4px solid #1890ff; }
        .stat-card.urgent { border-left-color: #ff4d4f; }
        .stat-card.completed { border-left-color: #52c41a; }
        
        .search-box { width: 100%; padding: 14px 20px; border: 2px solid #f0f0f0; border-radius: 12px; margin-bottom: 25px; font-size: 15px; }
        .search-box:focus { outline: none; border-color: #1890ff; box-shadow: 0 0 0 4px rgba(24,144,255,0.1); }
    </style>
</head>
